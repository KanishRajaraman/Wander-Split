{% extends 'base.html' %}
{% block title %}Add Stop — {{ trip.name }}{% endblock %}
{% block content %}
<div class="container-sm">
  <div style="font-size:0.85rem;color:var(--text3);margin-bottom:12px;">
    <a href="/trips/{{ trip.pk }}/route/" style="color:var(--text2);text-decoration:none;">← Back to Route Optimizer</a>
  </div>
  <div class="page-title">Add a Stop</div>
  <div class="page-subtitle">{{ trip.name }}</div>

  <div class="card">
    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label>Place Name *</label>
        <input type="text" name="name" placeholder="e.g. Taj Mahal, Café Coffee Day, IIT Library" required>
      </div>

      <div class="form-group">
        <label>Address *</label>
        <input type="text" name="address" id="address_input" placeholder="Full address or landmark" required>
        <input type="hidden" name="lat" id="lat_input" value="0">
        <input type="hidden" name="lng" id="lng_input" value="0">
        <div style="font-size:0.8rem;color:var(--text3);margin-top:4px;">Coordinates auto-fill with Google Maps API. You can also enter them manually below.</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Latitude</label>
          <input type="number" name="lat" id="lat_manual" step="any" placeholder="e.g. 27.1751">
        </div>
        <div class="form-group">
          <label>Longitude</label>
          <input type="number" name="lng" id="lng_manual" step="any" placeholder="e.g. 78.0421">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select name="category">
            <option value="attraction">🏛️ Attraction</option>
            <option value="food">🍔 Food &amp; Drink</option>
            <option value="accommodation">🏨 Accommodation</option>
            <option value="study">📚 Study-Friendly Spot</option>
            <option value="transport">🚉 Transport Hub</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="nature">🌿 Nature &amp; Parks</option>
            <option value="other">📌 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Time to Spend (minutes)</label>
          <input type="number" name="estimated_duration" value="60" min="5" max="480">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Entry Cost (₹)</label>
          <input type="number" name="entry_cost" value="0" min="0" step="10">
        </div>
        <div class="form-group">
          <!-- spacer -->
        </div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" placeholder="Opening hours, tips, things to do..."></textarea>
      </div>

      <div style="display:flex;gap:16px;margin-bottom:4px;">
        <label class="checkbox-row">
          <input type="checkbox" name="is_study_friendly">
          <span>📚 Study-Friendly (quiet, good for working)</span>
        </label>
      </div>
      <div style="display:flex;gap:16px;margin-bottom:20px;">
        <label class="checkbox-row">
          <input type="checkbox" name="has_wifi">
          <span>📶 Has WiFi</span>
        </label>
      </div>

      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary" style="flex:1;">Add to Trip ✓</button>
        <a href="/trips/{{ trip.pk }}/route/" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
// Sync manual lat/lng with hidden fields
document.getElementById('lat_manual').addEventListener('input', function() {
  document.getElementById('lat_input').value = this.value;
});
document.getElementById('lng_manual').addEventListener('input', function() {
  document.getElementById('lng_input').value = this.value;
});
</script>
{% endblock %}
