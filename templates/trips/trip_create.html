{% extends 'base.html' %}
{% block title %}Create Trip — WanderSplit{% endblock %}
{% block content %}
<div class="container-sm">
  <div class="page-title">Create a New Trip</div>
  <div class="page-subtitle">Set up your adventure — add your squad and budget</div>

  <div class="card">
    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label>Trip Name *</label>
        <input type="text" name="name" placeholder="e.g. Goa Beach Escape, Manali Snow Trip" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description" placeholder="What's the vibe of this trip?"></textarea>
      </div>

      <div class="form-group">
        <label>Starting Location *</label>
        <input type="text" name="start_location" id="start_location_input" placeholder="Your starting city or address" required>
        <input type="hidden" name="start_lat" id="start_lat" value="0">
        <input type="hidden" name="start_lng" id="start_lng" value="0">
        <div id="location-status" style="font-size:0.8rem;color:var(--text3);margin-top:4px;"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" name="start_date">
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input type="date" name="end_date">
        </div>
      </div>

      <div class="form-group">
        <label>Total Budget (₹)</label>
        <input type="number" name="budget" placeholder="0" min="0" step="100">
      </div>

      <div class="form-group">
        <label>Default Travel Mode</label>
        <div class="mode-toggle">
          <input type="radio" name="travel_mode" id="mode-cheapest" value="cheapest" checked>
          <label for="mode-cheapest">🚌 Cheapest (Walk / Bus)</label>
          <input type="radio" name="travel_mode" id="mode-fastest" value="fastest">
          <label for="mode-fastest">🚕 Fastest (Cab / Train)</label>
        </div>
      </div>

      <div class="form-group">
        <label>Invite Members (usernames, one per line)</label>
        <textarea name="members" placeholder="username1&#10;username2&#10;username3" style="min-height:80px;"></textarea>
        <div style="font-size:0.8rem;color:var(--text3);margin-top:4px;">They must already have a WanderSplit account</div>
      </div>

      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" class="btn btn-primary" style="flex:1;">Create Trip 🚀</button>
        <a href="/" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
// Simple geocoding via browser geolocation for starting point
const input = document.getElementById('start_location_input');
const latInput = document.getElementById('start_lat');
const lngInput = document.getElementById('start_lng');
const status = document.getElementById('location-status');

// Debounced geocoding would go here with Google Maps
// For now, users can enter coordinates manually or rely on address string
input.addEventListener('blur', function() {
  if (this.value.trim()) {
    status.textContent = 'Location saved. Add your Google Maps API key to enable geocoding.';
  }
});
</script>
{% endblock %}
